<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motoboy Delivery App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Poppins Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Força o mapa a ficar em tons de cinza para respeitar a paleta */
        .map-tiles-grayscale {
            filter: grayscale(100%) !important;
        }
        /* Poppins em todo o sistema */
        body {
            font-family: 'Poppins', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif !important;
        }
        /* Protege o botão "Finalizar Entrega" dos botões de navegação do Android */
        .delivery-bottom-panel {
            padding-bottom: calc(1rem + env(safe-area-inset-bottom)) !important;
        }
    </style>
</head>
<body class="bg-gray-50 text-black font-sans antialiased">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        // --- Ícones SVG Inline ---
        const IconMapPin = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
        const IconPackage = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>;
        const IconNavigation = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>;
        const IconLayers = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 12 12 17 22 12"/><polyline points="2 17 12 22 22 17"/></svg>;
        const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;
        const IconLogOut = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>;
        const IconUser = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const IconLock = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
        const IconMail = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>;
        // --- Mock Data ---
        const MOCK_DELIVERIES = [
            { id: '1042', product: 'Documentos Confidenciais', distance: '3.2 km', payout: 'R$ 12,50', address: 'Av. Paulista, 1000', coords: [-23.564, -46.652] },
            { id: '1043', product: 'Peças de Computador', distance: '5.8 km', payout: 'R$ 18,00', address: 'Rua Santa Ifigênia, 250', coords: [-23.538, -46.636] },
            { id: '1044', product: 'Roupas de Loja', distance: '2.1 km', payout: 'R$ 9,00', address: 'Rua Oscar Freire, 800', coords: [-23.561, -46.669] },
        ];
        const DRIVER_START_LOCATION = [-23.5505, -46.6333]; // Centro de SP
        // --- Map Component ---
        function DeliveryMap({ driverLocation, deliveryLocation, productName }) {
            const mapContainerRef = useRef(null);
            const mapInstanceRef = useRef(null);
            const [mapMode, setMapMode] = useState('normal');
            // Inicialização do Mapa (Roda apenas uma vez ao montar)
            useEffect(() => {
                if (!mapInstanceRef.current && mapContainerRef.current) {
                    mapInstanceRef.current = L.map(mapContainerRef.current, {
                        zoomControl: false,
                        attributionControl: false
                    });
                    mapInstanceRef.current.setView(DRIVER_START_LOCATION, 13);
                }
                return () => {
                    if (mapInstanceRef.current) {
                        mapInstanceRef.current.remove();
                        mapInstanceRef.current = null;
                    }
                };
            }, []);
            // Atualização de Camadas, Marcadores e Rota
            useEffect(() => {
                const map = mapInstanceRef.current;
                if (!map) return;
                map.eachLayer((layer) => {
                    map.removeLayer(layer);
                });
                if (mapMode === 'normal') {
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '&copy; OpenStreetMap contributors',
                        className: 'map-tiles-grayscale'
                    }).addTo(map);
                } else {
                    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                        attribution: 'Tiles &copy; Esri',
                        className: 'map-tiles-grayscale'
                    }).addTo(map);
                }
                const driverIcon = L.divIcon({
                    className: 'bg-transparent border-0',
                    html: `<div class="flex items-center justify-center w-10 h-10 bg-black rounded-full border-2 border-white shadow-md">
                      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <!-- linhas de movimento (igual à imagem) -->
                        <line x1="1" y1="8" x2="4" y2="8" stroke-width="1.5"/>
                        <line x1="1" y1="11" x2="4" y2="11" stroke-width="1.5"/>
                        <line x1="1" y1="14" x2="4" y2="14" stroke-width="1.5"/>
                        <!-- scooter + motorista + caixa atrás (minimalista e parecido com a imagem) -->
                        <path d="M7 13 L7 16 L13 16 L15 13"/>
                        <circle cx="8" cy="18" r="2"/>
                        <circle cx="16" cy="18" r="2"/>
                        <!-- caixa de entrega atrás -->
                        <rect x="15" y="10" width="5" height="5" rx="1" ry="1"/>
                        <!-- motorista (capacete + corpo) -->
                        <circle cx="13" cy="9" r="2"/>
                        <path d="M13 11 L13 13"/>
                        <path d="M11 12 L15 12"/>
                      </svg>
                    </div>`,
                    iconSize: [40, 40],
                    iconAnchor: [20, 20],
                    popupAnchor: [0, -20],
                });
                const destinationIcon = L.divIcon({
                    className: 'bg-transparent border-0',
                    html: `<div class="flex items-center justify-center w-10 h-10 bg-gray-500 rounded-full border-2 border-white shadow-md">
                      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
                    </div>`,
                    iconSize: [40, 40],
                    iconAnchor: [20, 20],
                    popupAnchor: [0, -20],
                });
                L.marker(driverLocation, { icon: driverIcon }).addTo(map)
                    .bindPopup('<div class="text-black font-medium text-center">Sua localização</div>');
            
                L.marker(deliveryLocation, { icon: destinationIcon }).addTo(map)
                    .bindPopup(`<div class="text-black font-medium text-center">Destino:<br/><span class="text-gray-600">${productName}</span></div>`);
                const drawFallbackRoute = () => {
                    L.polyline([driverLocation, deliveryLocation], { color: mapMode === 'normal' ? 'black' : 'white', weight: 3, dashArray: '8, 8' }).addTo(map);
                    map.fitBounds(L.latLngBounds([driverLocation, deliveryLocation]), { padding: [50, 50] });
                };
                const fetchRoute = async () => {
                    try {
                        const startLon = driverLocation[1];
                        const startLat = driverLocation[0];
                        const endLon = deliveryLocation[1];
                        const endLat = deliveryLocation[0];
                        const response = await fetch(
                            `https://router.project-osrm.org/route/v1/driving/${startLon},${startLat};${endLon},${endLat}?overview=full&geometries=geojson`
                        );
                    
                        if (!response.ok) throw new Error("Falha na API");
                    
                        const data = await response.json();
                        if (data.routes && data.routes.length > 0) {
                            const route = data.routes[0];
                            const coords = route.geometry.coordinates.map(c => [c[1], c[0]]);
                            const distMeters = route.distance;
                            const distStr = distMeters >= 1000
                                ? `${(distMeters / 1000).toFixed(1)} km`
                                : `${Math.round(distMeters)} m`;
                            const durationMins = Math.round(route.duration / 60);
                            const timeStr = `${durationMins} min`;
                            const midpoint = coords[Math.floor(coords.length / 2)];
                            const borderColor = mapMode === 'normal' ? 'black' : 'white';
                            const fillColor = mapMode === 'normal' ? '#9ca3af' : '#4b5563';
                            L.polyline(coords, { color: borderColor, weight: 8, opacity: 1, lineCap: 'round', lineJoin: 'round' }).addTo(map);
                            L.polyline(coords, { color: fillColor, weight: 4, opacity: 1, lineCap: 'round', lineJoin: 'round' }).addTo(map);
                            const infoLabelIcon = L.divIcon({
                                className: 'bg-transparent border-0',
                                html: `<div class="bg-white border-2 border-black text-black font-bold text-xs py-1.5 px-3 rounded-full shadow-lg whitespace-nowrap flex items-center gap-2">
                                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><path d="M9 17h6"/><circle cx="17" cy="17" r="2"/></svg>
                                  <span>${timeStr}</span>
                                  <span class="text-gray-500 font-normal border-l border-gray-300 pl-2">${distStr}</span>
                                </div>`,
                                iconSize: [120, 30],
                                iconAnchor: [60, 15],
                            });
                            L.marker(midpoint, { icon: infoLabelIcon, zIndexOffset: 1000 }).addTo(map);
                            map.fitBounds(L.latLngBounds(coords), { padding: [50, 50] });
                        } else {
                            drawFallbackRoute();
                        }
                    } catch (error) {
                        console.error("Erro ao buscar rota:", error);
                        drawFallbackRoute();
                    }
                };
                fetchRoute();
            }, [driverLocation, deliveryLocation, productName, mapMode]);
            return (
                <div className="relative w-full h-full">
                    <button
                        onClick={() => setMapMode(prev => prev === 'normal' ? 'satellite' : 'normal')}
                        className="absolute top-4 right-4 z-[400] bg-white text-black p-2 rounded-md shadow-md border border-gray-200 flex items-center gap-2 hover:bg-gray-100 transition-colors"
                    >
                        <IconLayers />
                        <span className="text-sm font-bold">{mapMode === 'normal' ? 'Satélite' : 'Mapa'}</span>
                    </button>
                    <div ref={mapContainerRef} className="w-full h-full z-0"></div>
                </div>
            );
        }
        // --- Main App Component ---
        function App() {
            const [view, setView] = useState('login');
            const [user, setUser] = useState(null);
            const [activeDelivery, setActiveDelivery] = useState(null);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [name, setName] = useState('');
            // Armazenamento TEMPORÁRIO em sessionStorage (limpa ao fechar a aba) - simula sistema real sem expor dados no código
            const [usersDb, setUsersDb] = useState(() => {
                const saved = sessionStorage.getItem('deliveryUsers');
                if (saved) return JSON.parse(saved);
                return [{ name: 'Motoboy Teste', email: 'teste@teste.com', password: '123' }];
            });

            // Salva automaticamente no sessionStorage sempre que usersDb mudar
            useEffect(() => {
                sessionStorage.setItem('deliveryUsers', JSON.stringify(usersDb));
            }, [usersDb]);

            const handleLogin = (e) => {
                e.preventDefault();
                const foundUser = usersDb.find(u => u.email === email && u.password === password);
                if (foundUser) {
                    setUser(foundUser);
                    setView('dashboard');
                } else {
                    alert('Credenciais inválidas. Tente teste@teste.com / 123');
                }
            };
            const handleRegister = (e) => {
                e.preventDefault();
                if (usersDb.find(u => u.email === email)) {
                    alert('Email já cadastrado.');
                    return;
                }
                const newUser = { name, email, password };
                setUsersDb([...usersDb, newUser]);
                setUser(newUser);
                setView('dashboard');
            };
            const handleLogout = () => {
                setUser(null);
                setView('login');
                setEmail('');
                setPassword('');
            };
            const acceptDelivery = (delivery) => {
                setActiveDelivery(delivery);
                setView('delivery');
            };
            const finishDelivery = () => {
                setActiveDelivery(null);
                setView('dashboard');
                alert('Entrega finalizada com sucesso!');
            };
            if (view === 'login') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border border-gray-200">
                            <div className="flex justify-center mb-6">
                                <div className="bg-black p-3 rounded-full text-white">
                                    <IconPackage />
                                </div>
                            </div>
                            <h1 className="text-2xl font-bold text-center mb-6 text-black">Entrar no Sistema</h1>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Email</label>
                                    <div className="relative">
                                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                                            <IconMail />
                                        </div>
                                        <input type="email" required value={email} onChange={e => setEmail(e.target.value)} className="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-black focus:border-black" placeholder="teste@teste.com" />
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                                    <div className="relative">
                                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                                            <IconLock />
                                        </div>
                                        <input type="password" required value={password} onChange={e => setPassword(e.target.value)} className="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-black focus:border-black" placeholder="123" />
                                    </div>
                                </div>
                                <button type="submit" className="w-full bg-black text-white py-2 px-4 rounded-md hover:bg-gray-800 transition-colors font-medium">Entrar</button>
                            </form>
                            <div className="mt-6 text-center">
                                <p className="text-sm text-gray-600">Não tem uma conta? <button onClick={() => setView('register')} className="text-black font-bold hover:underline">Criar agora</button></p>
                            </div>
                        </div>
                    </div>
                );
            }
            if (view === 'register') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border border-gray-200">
                            <h1 className="text-2xl font-bold text-center mb-6 text-black">Criar Conta</h1>
                            <form onSubmit={handleRegister} className="space-y-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Nome Completo</label>
                                    <div className="relative">
                                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                                            <IconUser />
                                        </div>
                                        <input type="text" required value={name} onChange={e => setName(e.target.value)} className="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-black focus:border-black" placeholder="Seu Nome" />
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Email</label>
                                    <div className="relative">
                                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                                            <IconMail />
                                        </div>
                                        <input type="email" required value={email} onChange={e => setEmail(e.target.value)} className="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-black focus:border-black" placeholder="seu@email.com" />
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                                    <div className="relative">
                                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                                            <IconLock />
                                        </div>
                                        <input type="password" required value={password} onChange={e => setPassword(e.target.value)} className="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-black focus:border-black" placeholder="Sua senha" />
                                    </div>
                                </div>
                                <button type="submit" className="w-full bg-black text-white py-2 px-4 rounded-md hover:bg-gray-800 transition-colors font-medium">Cadastrar</button>
                            </form>
                            <div className="mt-6 text-center">
                                <p className="text-sm text-gray-600">Já tem uma conta? <button onClick={() => setView('login')} className="text-black font-bold hover:underline">Fazer login</button></p>
                            </div>
                        </div>
                    </div>
                );
            }
            if (view === 'dashboard') {
                return (
                    <div className="min-h-screen bg-gray-100">
                        <header className="bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center sticky top-0 z-10">
                            <div className="flex items-center gap-2">
                                <div className="bg-black p-2 rounded-md text-white"><IconPackage /></div>
                                <h1 className="text-xl font-bold text-black">Entregas Disponíveis</h1>
                            </div>
                            <div className="flex items-center gap-4">
                                <span className="text-sm font-medium text-gray-600 hidden sm:inline-block">Olá, {user?.name}</span>
                                <button onClick={handleLogout} className="text-gray-500 hover:text-black transition-colors p-2 rounded-md hover:bg-gray-100" title="Sair">
                                    <IconLogOut />
                                </button>
                            </div>
                        </header>
                        <main className="p-6 max-w-4xl mx-auto">
                            <div className="grid gap-4">
                                {MOCK_DELIVERIES.map(delivery => (
                                    <div key={delivery.id} className="bg-white p-5 rounded-xl shadow-sm border border-gray-200 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                        <div className="space-y-2">
                                            <div className="flex items-center gap-2">
                                                <span className="bg-gray-100 text-black text-xs font-bold px-2 py-1 rounded">#{delivery.id}</span>
                                                <h3 className="font-bold text-lg text-black">{delivery.product}</h3>
                                            </div>
                                            <div className="flex items-center gap-4 text-sm text-gray-600">
                                                <div className="flex items-center gap-1"><IconMapPin /> {delivery.distance}</div>
                                                <div className="font-bold text-black">{delivery.payout}</div>
                                            </div>
                                            <p className="text-sm text-gray-500">{delivery.address}</p>
                                        </div>
                                        <button onClick={() => acceptDelivery(delivery)} className="w-full sm:w-auto bg-black text-white px-6 py-3 rounded-md font-medium hover:bg-gray-800 transition-colors flex items-center justify-center gap-2">
                                            <IconCheck /> Aceitar Entrega
                                        </button>
                                    </div>
                                ))}
                            </div>
                        </main>
                    </div>
                );
            }
            if (view === 'delivery' && activeDelivery) {
                return (
                    <div className="h-[100dvh] flex flex-col bg-white">
                        <header className="bg-white border-b border-gray-200 px-4 py-3 flex justify-between items-center z-10 shadow-sm">
                            <div>
                                <h1 className="text-lg font-bold text-black">Entrega em Andamento</h1>
                                <p className="text-xs text-gray-500">Pedido #{activeDelivery.id} • {activeDelivery.product}</p>
                            </div>
                            <button onClick={() => setView('dashboard')} className="text-sm font-medium text-gray-500 hover:text-black">Voltar</button>
                        </header>
                    
                        <div className="flex-1 relative bg-gray-100">
                            <DeliveryMap
                                driverLocation={DRIVER_START_LOCATION}
                                deliveryLocation={activeDelivery.coords}
                                productName={activeDelivery.product}
                            />
                        </div>
                        <div className="bg-white border-t border-gray-200 p-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-10 delivery-bottom-panel">
                            <div className="max-w-md mx-auto space-y-4">
                                <div className="flex justify-between items-center">
                                    <div>
                                        <p className="text-sm text-gray-500">Destino</p>
                                        <p className="font-bold text-black">{activeDelivery.address}</p>
                                    </div>
                                    <div className="text-right">
                                        <p className="text-sm text-gray-500">Ganhos</p>
                                        <p className="font-bold text-black text-lg">{activeDelivery.payout}</p>
                                    </div>
                                </div>
                                <button onClick={finishDelivery} className="w-full bg-black text-white py-3 rounded-md font-bold text-lg hover:bg-gray-800 transition-colors shadow-md">
                                    Finalizar Entrega
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }
            return null;
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
