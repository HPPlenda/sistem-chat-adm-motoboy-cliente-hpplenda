<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Logística</title>
 
    <!-- Fonte Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
 
    <!-- Tailwind CSS para Estilização -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* Padrão de fundo para a área de mensagens */
        .bg-pattern {
            background-color: #f3f4f6;
            background-image: radial-gradient(#d1d5db 1px, transparent 1px);
            background-size: 20px 20px;
        }
        /* Estilizar scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        /* Safe area inset para barra de navegação nativa do Android */
        /* Mantém o campo de input sempre visível acima dos botões voltar/home/minimizar */
        .input-area {
            padding-bottom: calc(2rem + env(safe-area-inset-bottom, 0px));
        }
        /* Animação do botão de enviar: o ícone troca de cor para a cor do botão (preto) em 0.3s */
        #send-button svg {
            transition: stroke 0.3s ease-in-out;
        }
    </style>

.0289,0.0116 0.04621,0.04602 0.90147,1.681283 1.900298,3.634141 0.998826,1.952863 1.993657,3.774361 2.211231,4.046799 0.210772,0.263926 0.361514,0.504547 0.343302,0.546738 l -0.0012,0.0012 v 0.0012 h -0.0012 c -0.104345,0.104345 -1.282285,-0.723634 -1.826316,-1.284201 -0.522632,-0.538576 -2.781318,-4.166336 -3.068877,-4.928776 -0.222013,-0.588641 -0.168586,-1.449135 0.110971,-1.793955 0.115289,-0.142211 0.23899,-0.236513 0.302845,-0.234648 z m 39.019633,0.727062 c 0.0093,-3.98e-4 0.01737,0.0012 0.02312,0.0046 0.0012,8.66e-4 0.0037,0.0036 0.0046,0.0046 0.0526,0.05542 0.391414,0.880617 0.753645,1.83441 l 0.658863,1.733847 -0.290131,0.368729 c -0.245011,0.31075 -0.380429,0.365189 -0.87386,0.356018 -0.846219,-0.01588 -3.416433,-0.231939 -3.476938,-0.292442 v -0.0012 c -0.06314,-0.09142 0.553957,-1.287629 1.003318,-1.940753 0.460987,-0.670021 1.94727,-2.057157 2.19736,-2.067901 z" /></svg>',
            CLIENTE: '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>'
        };
        // Inicialização
        function init() {
            const saved = localStorage.getItem('chat_messages');
            if (saved) {
                try {
                    messages = JSON.parse(saved);
                } catch (e) {
                    console.error('Erro ao carregar mensagens', e);
                }
            }
            renderMessages();
            // Habilitar/desabilitar botão de envio
            messageInput.addEventListener('input', (e) => {
                sendButton.disabled = e.target.value.trim() === '';
            });
        }
        // Mudar o papel atual (Quem está enviando)
        function setRole(role) {
            currentRole = role;
         
            // Atualizar botões
            document.querySelectorAll('.role-btn').forEach(btn => {
                btn.className = 'role-btn flex items-center gap-1.5 px-3 py-2 md:px-5 md:py-2.5 rounded-full text-xs md:text-sm font-semibold transition-all duration-200 bg-gray-100 text-gray-600 hover:bg-gray-200';
            });
         
            const activeBtn = document.getElementById(`btn-${role}`);
            activeBtn.className = 'role-btn flex items-center gap-1.5 px-3 py-2 md:px-5 md:py-2.5 rounded-full text-xs md:text-sm font-semibold transition-all duration-200 bg-black text-white shadow-md transform scale-105';
         
            renderMessages(); // Re-renderizar para ajustar o lado das mensagens (direita/esquerda)
        }
        // Enviar mensagem COM ANIMAÇÃO DE 0.3s NO ÍCONE
        chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            if (!text) return;
            // 1. Inicia a animação: ícone troca de cor para a cor do botão (preto)
            const svg = sendButton.querySelector('svg');
            const originalStroke = svg.getAttribute('stroke') || 'currentColor';
            svg.setAttribute('stroke', '#111111'); // cor do botão (preto)
            // Desabilita o botão durante a animação para evitar duplo envio
            sendButton.disabled = true;
            // 2. Depois de 0.3s, envia a mensagem e volta o ícone ao normal
            setTimeout(() => {
                const newMessage = {
                    id: Date.now().toString(),
                    role: currentRole,
                    text: text,
                    timestamp: Date.now()
                };
                messages.push(newMessage);
                localStorage.setItem('chat_messages', JSON.stringify(messages));
             
                messageInput.value = '';
                // Reverte a cor do ícone
                svg.setAttribute('stroke', originalStroke);
               
                renderMessages();
                // O listener do input já cuida de desabilitar o botão
            }, 300);
        });
        // Limpar conversa
        function clearChat() {
            if (confirm('Tem certeza que deseja limpar a conversa?')) {
                messages = [];
                localStorage.removeItem('chat_messages');
                renderMessages();
            }
        }
        // Renderizar as mensagens na tela
        function renderMessages() {
            messagesContainer.innerHTML = '';
            if (messages.length === 0) {
                messagesContainer.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-gray-500 space-y-3 m-auto">
                        <div class="bg-white p-4 rounded-full shadow-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-400"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                        </div>
                        <p class="text-sm font-medium">Nenhuma mensagem ainda.</p>
                        <p class="text-xs text-gray-400 text-center max-w-xs">
                            Selecione quem está enviando a mensagem abaixo e comece a conversar!
                        </p>
                    </div>
                `;
                return;
            }
            messages.forEach((msg, index) => {
                const isMe = msg.role === currentRole;
                const showHeader = index === 0 || messages[index - 1].role !== msg.role;
             
                // Definir cores baseadas no papel
                let colorClass = '';
                let timeColorClass = '';
             
                if (msg.role === 'ADM') {
                    colorClass = 'bg-black text-white';
                    timeColorClass = 'text-gray-400';
                } else if (msg.role === 'MOTOBOY') {
                    colorClass = 'bg-gray-500 text-white';
                    timeColorClass = 'text-gray-300';
                } else {
                    colorClass = 'bg-white text-black border border-gray-300';
                    timeColorClass = 'text-gray-400';
                }
                const timeString = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const msgWrapper = document.createElement('div');
                msgWrapper.className = `flex ${isMe ? 'justify-end' : 'justify-start'}`;
                let headerHtml = '';
                if (showHeader) {
                    headerHtml = `
                        <div class="flex items-center gap-1 mb-1 text-xs text-gray-600 ${isMe ? 'flex-row-reverse' : 'flex-row'}">
                            ${icons[msg.role]}
                            <span class="font-semibold">${msg.role}</span>
                        </div>
                    `;
                }
                msgWrapper.innerHTML = `
                    <div class="flex flex-col max-w-[85%] md:max-w-[70%] ${isMe ? 'items-end' : 'items-start'}">
                        ${headerHtml}
                        <div class="p-3 rounded-2xl ${colorClass} ${isMe ? 'rounded-tr-sm' : 'rounded-tl-sm'} shadow-sm relative group">
                            <p class="break-words text-sm md:text-base leading-relaxed">${msg.text}</p>
                            <div class="text-[10px] mt-1 flex justify-end ${timeColorClass}">
                                ${timeString}
                            </div>
                        </div>
                    </div>
                `;
                messagesContainer.appendChild(msgWrapper);
            });
            // Rolar para o final
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        // Iniciar a aplicação
        init();
    </script>
