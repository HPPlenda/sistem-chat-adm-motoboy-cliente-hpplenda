<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Logística</title>
    <!-- Fonte Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS para Estilização -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* Padrão de fundo para a área de mensagens */
        .bg-pattern {
            background-color: #f3f4f6;
            background-image: radial-gradient(#d1d5db 1px, transparent 1px);
            background-size: 20px 20px;
        }
        /* Estilizar scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        /* Safe area inset para barra de navegação nativa do Android */
        /* Mantém o campo de input sempre visível acima dos botões voltar/home/minimizar */
        /* Removido o padding extra (2rem) para eliminar distâncias desnecessárias no Android */
        .input-area {
            padding-bottom: env(safe-area-inset-bottom, 0px);
        }
        /* Animação do botão de enviar: o ícone troca de cor para a cor do botão (preto) em 0.3s */
        #send-button .icon-motoboy {
            transition: color 0.3s ease-in-out;
        }
        /* Garante que não haja nenhuma barra ou espaço extra no topo no Android */
        html, body {
            margin: 0;
            padding: 0;
        }
        /* Fonte de ícones personalizada (icon_entrega.ttf) */
        @font-face {
            font-family: 'MeusIconesSociais';
            src: url('icon_entrega.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        .icon-motoboy {
            font-family: 'MeusIconesSociais';
            display: inline-block;
            line-height: 1;
            -webkit-text-stroke-width: 0;
            text-stroke-width: 0;
            paint-order: fill;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
    </style>
</head>
<body class="bg-gray-300 text-black font-sans antialiased min-h-screen flex md:items-center md:justify-center p-0 md:p-4">
    <div class="w-full max-w-3xl bg-white md:rounded-3xl shadow-2xl overflow-hidden flex flex-col h-[100dvh] md:h-[90vh]">
        <!-- Cabeçalho -->
        <div class="bg-black text-white p-4 flex justify-between items-center z-10 shadow-md">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gray-800 rounded-full flex items-center justify-center border border-gray-600 flex-shrink-0">
                    <!-- Ícone Moto agora usando o caractere a da fonte icon_entrega.ttf -->
                    <span class="icon-motoboy text-white" style="font-size: 24px;">a</span>
                </div>
                <div>
                    <h1 class="text-lg font-bold leading-tight">Código de entrega: #ADM_MOTOBOY_CLIENTE</h1>
                    <p class="text-xs text-gray-400">ADM, Motoboy, Cliente</p>
                </div>
            </div>
            <button onclick="clearChat()" class="p-2 hover:bg-gray-800 rounded-full transition-colors" title="Limpar conversa">
                <!-- Ícone Lixeira -->
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
            </button>
        </div>
        <!-- Área de Mensagens -->
        <div id="messages-container" class="flex-1 overflow-y-auto p-4 bg-pattern relative flex flex-col gap-4">
            <!-- As mensagens serão injetadas aqui via JavaScript -->
        </div>
        <!-- Área de Input -->
        <div id="input-wrapper" class="input-area bg-white p-4 border-t border-gray-200 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-10">
            <div class="mb-4">
                <p class="text-xs text-gray-500 mb-2 font-medium uppercase tracking-wider text-center">Enviar mensagem como:</p>
                <div class="flex justify-center gap-2 md:gap-4" id="role-selector">
                    <!-- Botões de Papel -->
                    <button onclick="setRole('ADM')" id="btn-ADM" class="role-btn flex items-center gap-1.5 px-3 py-2 md:px-5 md:py-2.5 rounded-full text-xs md:text-sm font-semibold transition-all duration-200 bg-black text-white shadow-md transform scale-105">
                        <span class="icon-motoboy" style="font-size: 16px;">c</span>
                        ADM
                    </button>
                    <button onclick="setRole('MOTOBOY')" id="btn-MOTOBOY" class="role-btn flex items-center gap-1.5 px-3 py-2 md:px-5 md:py-2.5 rounded-full text-xs md:text-sm font-semibold transition-all duration-200 bg-gray-100 text-gray-600 hover:bg-gray-200">
                        <!-- Ícone Motoboy agora usando o caractere a da fonte icon_entrega.ttf -->
                        <span class="icon-motoboy" style="font-size: 16px;">a</span>
                        MOTOBOY
                    </button>
                    <button onclick="setRole('CLIENTE')" id="btn-CLIENTE" class="role-btn flex items-center gap-1.5 px-3 py-2 md:px-5 md:py-2.5 rounded-full text-xs md:text-sm font-semibold transition-all duration-200 bg-gray-100 text-gray-600 hover:bg-gray-200">
                        <span class="icon-motoboy" style="font-size: 16px;">d</span>
                        CLIENTE
                    </button>
                </div>
            </div>
   
            <form id="chat-form" class="flex gap-2 items-end">
                <div class="flex-1 bg-gray-100 rounded-3xl border border-gray-200 focus-within:border-gray-400 focus-within:bg-white transition-colors overflow-hidden flex items-center">
                    <input
                        type="text"
                        id="message-input"
                        placeholder="Digite uma mensagem..."
                        class="w-full p-3 md:p-4 bg-transparent focus:outline-none text-sm md:text-base"
                        autocomplete="off"
                    />
                </div>
                <button
                    type="submit"
                    id="send-button"
                    disabled
                    class="bg-black text-white p-3 md:p-4 rounded-full hover:bg-gray-800 disabled:opacity-50 disabled:cursor-not-allowed transition-all flex items-center justify-center shadow-md flex-shrink-0"
                >
                    <!-- Ícone centralizado (letra "f" da fonte icon_entrega.ttf) -->
                    <span id="send-icon" class="icon-motoboy" style="font-size: 24px;">f</span>
                </button>
            </form>
        </div>
    </div>
    <!-- Lógica do Sistema -->
    <script>
        // Estado da aplicação
        let messages = [];
        let currentRole = 'ADM';
        // Elementos do DOM
        const messagesContainer = document.getElementById('messages-container');
        const chatForm = document.getElementById('chat-form');
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('send-button');
        const sendIcon = document.getElementById('send-icon');
        // Ícones SVG para cada papel (apenas Motoboy trocado pelo caractere > da fonte)
        const icons = {
            ADM: '<span class="icon-motoboy" style="font-size: 14px;">c</span>',
            MOTOBOY: '<span class="icon-motoboy" style="font-size: 14px;">a</span>',
            CLIENTE: '<span class="icon-motoboy" style="font-size: 14px;">d</span>'
        };
        // Inicialização
        function init() {
            const saved = localStorage.getItem('chat_messages');
            if (saved) {
                try {
                    messages = JSON.parse(saved);
                } catch (e) {
                    console.error('Erro ao carregar mensagens', e);
                }
            }
            renderMessages();
            // Habilitar/desabilitar botão de envio
            messageInput.addEventListener('input', (e) => {
                sendButton.disabled = e.target.value.trim() === '';
            });
        }
        // Mudar o papel atual (Quem está enviando)
        function setRole(role) {
            currentRole = role;
   
            // Atualizar botões
            document.querySelectorAll('.role-btn').forEach(btn => {
                btn.className = 'role-btn flex items-center gap-1.5 px-3 py-2 md:px-5 md:py-2.5 rounded-full text-xs md:text-sm font-semibold transition-all duration-200 bg-gray-100 text-gray-600 hover:bg-gray-200';
            });
   
            const activeBtn = document.getElementById(`btn-${role}`);
            activeBtn.className = 'role-btn flex items-center gap-1.5 px-3 py-2 md:px-5 md:py-2.5 rounded-full text-xs md:text-sm font-semibold transition-all duration-200 bg-black text-white shadow-md transform scale-105';
   
            renderMessages(); // Re-renderizar para ajustar o lado das mensagens (direita/esquerda)
        }
        // Enviar mensagem COM ANIMAÇÃO DE 0.3s NO ÍCONE
        chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            if (!text) return;
            // 1. Inicia a animação: ícone troca de cor para a cor do botão (preto)
            const originalColor = sendIcon.style.color || '#ffffff';
            sendIcon.style.color = '#111111'; // cor do botão (preto)
            // Desabilita o botão durante a animação para evitar duplo envio
            sendButton.disabled = true;
            // 2. Depois de 0.3s, envia a mensagem e volta o ícone ao normal
            setTimeout(() => {
                const newMessage = {
                    id: Date.now().toString(),
                    role: currentRole,
                    text: text,
                    timestamp: Date.now()
                };
                messages.push(newMessage);
                localStorage.setItem('chat_messages', JSON.stringify(messages));
       
                messageInput.value = '';
                // Reverte a cor do ícone
                sendIcon.style.color = originalColor;
         
                renderMessages();
                // O listener do input já cuida de desabilitar o botão
            }, 300);
        });
        // Limpar conversa
        function clearChat() {
            if (confirm('Tem certeza que deseja limpar a conversa?')) {
                messages = [];
                localStorage.removeItem('chat_messages');
                renderMessages();
            }
        }
        // Renderizar as mensagens na tela
        function renderMessages() {
            messagesContainer.innerHTML = '';
            if (messages.length === 0) {
                messagesContainer.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-gray-500 space-y-3 m-auto">
                        <div class="bg-white p-4 rounded-full shadow-sm flex items-center justify-center">
                            <!-- Ícone substituído pelo caractere "e" da fonte icon_entrega.ttf -->
                            <span class="icon-motoboy text-gray-400" style="font-size: 32px;">e</span>
                        </div>
                        <p class="text-sm font-medium">Nenhuma mensagem ainda.</p>
                    </div>
                `;
                return;
            }
            messages.forEach((msg, index) => {
                const isMe = msg.role === currentRole;
                const showHeader = index === 0 || messages[index - 1].role !== msg.role;
       
                // Definir cores baseadas no papel
                let colorClass = '';
                let timeColorClass = '';
       
                if (msg.role === 'ADM') {
                    colorClass = 'bg-black text-white';
                    timeColorClass = 'text-gray-400';
                } else if (msg.role === 'MOTOBOY') {
                    colorClass = 'bg-gray-500 text-white';
                    timeColorClass = 'text-gray-300';
                } else {
                    colorClass = 'bg-white text-black border border-gray-300';
                    timeColorClass = 'text-gray-400';
                }
                const timeString = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const msgWrapper = document.createElement('div');
                msgWrapper.className = `flex ${isMe ? 'justify-end' : 'justify-start'}`;
                let headerHtml = '';
                if (showHeader) {
                    headerHtml = `
                        <div class="flex items-center gap-1 mb-1 text-xs text-gray-600 ${isMe ? 'flex-row-reverse' : 'flex-row'}">
                            ${icons[msg.role]}
                            <span class="font-semibold">${msg.role}</span>
                        </div>
                    `;
                }
                msgWrapper.innerHTML = `
                    <div class="flex flex-col max-w-[85%] md:max-w-[70%] ${isMe ? 'items-end' : 'items-start'}">
                        ${headerHtml}
                        <div class="p-3 rounded-2xl ${colorClass} ${isMe ? 'rounded-tr-sm' : 'rounded-tl-sm'} shadow-sm relative group">
                            <p class="break-words text-sm md:text-base leading-relaxed">${msg.text}</p>
                            <div class="text-[10px] mt-1 flex justify-end ${timeColorClass}">
                                ${timeString}
                            </div>
                        </div>
                    </div>
                `;
                messagesContainer.appendChild(msgWrapper);
            });
            // Rolar para o final
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        // Iniciar a aplicação
        init();
    </script>
</body>
</html>
