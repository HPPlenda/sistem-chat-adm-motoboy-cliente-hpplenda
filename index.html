<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motoboy Delivery App</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet CSS (Mapa) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Feather Icons (Ícones SVG grátis) -->
    <script src="https://unpkg.com/feather-icons"></script>

    <style>
        /* Filtro para deixar o mapa em tons de cinza */
        .map-tiles-grayscale {
            filter: grayscale(100%);
        }
        
        /* Ocultar elementos */
        .hidden-view {
            display: none !important;
        }

        /* Ajuste do container do mapa */
        #map-container {
            height: 100%;
            width: 100%;
            z-index: 0;
        }
    </style>
</head>
<body class="bg-gray-50 text-black font-sans antialiased">

    <!-- ================= VIEW: LOGIN ================= -->
    <div id="view-login" class="min-h-screen flex flex-col justify-center items-center p-4">
        <div class="w-full max-w-md bg-white p-8 rounded-xl shadow-sm border border-gray-200">
            <div class="flex justify-center mb-6">
                <div class="w-16 h-16 bg-black rounded-full flex items-center justify-center">
                    <i data-feather="package" class="text-white w-8 h-8"></i>
                </div>
            </div>
            <h1 class="text-2xl font-bold text-center text-black mb-2">Entrar no Sistema</h1>
            <p class="text-center text-gray-500 mb-8">Acesse para ver as entregas disponíveis</p>
            
            <form id="form-login" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
                    <div class="relative">
                        <i data-feather="mail" class="absolute left-3 top-3 w-5 h-5 text-gray-400"></i>
                        <input type="email" id="login-email" required class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-black focus:border-black outline-none transition-colors text-black" placeholder="seu@email.com">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                    <div class="relative">
                        <i data-feather="lock" class="absolute left-3 top-3 w-5 h-5 text-gray-400"></i>
                        <input type="password" id="login-password" required class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-black focus:border-black outline-none transition-colors text-black" placeholder="••••••••">
                    </div>
                </div>
                <button type="submit" class="w-full bg-black text-white font-medium py-3 rounded-lg hover:bg-gray-800 transition-colors mt-6">
                    Entrar
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <p class="text-gray-600 text-sm">
                    Não tem uma conta? 
                    <button onclick="switchView('view-register')" class="text-black font-bold hover:underline">Criar cadastro</button>
                </p>
            </div>
        </div>
    </div>

    <!-- ================= VIEW: REGISTER ================= -->
    <div id="view-register" class="min-h-screen flex flex-col justify-center items-center p-4 hidden-view">
        <div class="w-full max-w-md bg-white p-8 rounded-xl shadow-sm border border-gray-200">
            <button onclick="switchView('view-login')" class="flex items-center text-gray-500 hover:text-black mb-6 transition-colors">
                <i data-feather="arrow-left" class="w-4 h-4 mr-1"></i> Voltar
            </button>
            
            <h1 class="text-2xl font-bold text-black mb-2">Criar Cadastro</h1>
            <p class="text-gray-500 mb-8">Cadastre-se para começar a fazer entregas</p>
            
            <form id="form-register" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nome Completo</label>
                    <div class="relative">
                        <i data-feather="user" class="absolute left-3 top-3 w-5 h-5 text-gray-400"></i>
                        <input type="text" id="reg-name" required class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-black focus:border-black outline-none transition-colors text-black" placeholder="João Silva">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
                    <div class="relative">
                        <i data-feather="mail" class="absolute left-3 top-3 w-5 h-5 text-gray-400"></i>
                        <input type="email" id="reg-email" required class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-black focus:border-black outline-none transition-colors text-black" placeholder="seu@email.com">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                    <div class="relative">
                        <i data-feather="lock" class="absolute left-3 top-3 w-5 h-5 text-gray-400"></i>
                        <input type="password" id="reg-password" required class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-black focus:border-black outline-none transition-colors text-black" placeholder="••••••••">
                    </div>
                </div>
                <button type="submit" class="w-full bg-black text-white font-medium py-3 rounded-lg hover:bg-gray-800 transition-colors mt-6">
                    Cadastrar
                </button>
            </form>
        </div>
    </div>

    <!-- ================= VIEW: DASHBOARD ================= -->
    <div id="view-dashboard" class="min-h-screen pb-10 hidden-view">
        <header class="bg-white border-b border-gray-200 sticky top-0 z-10">
            <div class="max-w-3xl mx-auto px-4 h-16 flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-black rounded-full flex items-center justify-center">
                        <i data-feather="package" class="text-white w-4 h-4"></i>
                    </div>
                    <span class="font-bold text-black text-lg">Entregas</span>
                </div>
                <div class="flex items-center gap-4">
                    <span id="dashboard-user-name" class="text-sm font-medium text-gray-600 hidden sm:block">Olá, Motoboy</span>
                    <button onclick="logout()" class="text-gray-500 hover:text-black transition-colors" title="Sair">
                        <i data-feather="log-out" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </header>

        <main class="max-w-3xl mx-auto px-4 mt-8">
            <div class="mb-6">
                <h2 class="text-xl font-bold text-black">Pedidos Disponíveis</h2>
                <p class="text-gray-500 text-sm">Aceite uma corrida para começar</p>
            </div>

            <div id="deliveries-list" class="space-y-4">
                <!-- Pedidos serão injetados aqui via JS -->
            </div>
        </main>
    </div>

    <!-- ================= VIEW: DELIVERY (MAPA) ================= -->
    <div id="view-delivery" class="h-screen flex flex-col hidden-view">
        <header class="bg-white border-b border-gray-200 shrink-0">
            <div class="max-w-3xl mx-auto px-4 h-16 flex items-center">
                <button onclick="switchView('view-dashboard')" class="mr-4 text-gray-500 hover:text-black transition-colors">
                    <i data-feather="arrow-left" class="w-6 h-6"></i>
                </button>
                <div>
                    <h2 class="font-bold text-black leading-tight">Entrega em Andamento</h2>
                    <p id="delivery-id-header" class="text-xs text-gray-500">DEL-000</p>
                </div>
            </div>
        </header>

        <div class="flex-1 relative bg-gray-200">
            <!-- Botão de Alternar Mapa/Satélite -->
            <button onclick="toggleMapMode()" class="absolute top-4 right-4 bg-white text-black p-2 rounded-md shadow-md border border-gray-200 flex items-center gap-2 hover:bg-gray-100 transition-colors z-[400]">
                <i data-feather="layers" class="w-5 h-5"></i>
                <span id="map-toggle-text" class="text-sm font-bold">Satélite</span>
            </button>

            <!-- Container do Mapa -->
            <div id="map-container"></div>
            
            <!-- Status Overlay -->
            <div class="absolute top-4 left-1/2 -translate-x-1/2 bg-white px-4 py-2 rounded-full shadow-md border border-gray-200 flex items-center gap-2 z-[400]">
                <span class="relative flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-gray-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-black"></span>
                </span>
                <span class="text-sm font-bold text-black uppercase tracking-wider">Em Rota</span>
            </div>
        </div>

        <div class="bg-white border-t border-gray-200 p-4 shrink-0 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-[400]">
            <div class="max-w-3xl mx-auto">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h3 id="delivery-product" class="font-bold text-black text-lg">Produto</h3>
                        <p id="delivery-address" class="text-sm text-gray-600 mt-1">Endereço</p>
                    </div>
                    <div class="text-right">
                        <span id="delivery-payout" class="block text-xl font-black text-black">R$ 0,00</span>
                        <span class="text-sm text-gray-500 flex items-center justify-end gap-1 mt-1">
                            <i data-feather="clock" class="w-3 h-3"></i> ~15 min
                        </span>
                    </div>
                </div>
                
                <button onclick="finishDelivery()" class="w-full bg-black text-white font-medium py-4 rounded-lg hover:bg-gray-800 transition-colors flex items-center justify-center gap-2 text-lg">
                    <i data-feather="check-circle" class="w-6 h-6"></i>
                    Finalizar Entrega
                </button>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Lógica do Aplicativo -->
    <script>
        // Inicializar ícones
        feather.replace();

        // Estado do App
        let registeredUser = null;
        let activeDelivery = null;
        let mapInstance = null;
        
        // Camadas do mapa
        let currentLayerMode = 'normal';
        let normalLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            className: 'map-tiles-grayscale'
        });
        let satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri',
            className: 'map-tiles-grayscale'
        });
        let routePolyline = null;

        // Dados Mockados
        const MOCK_DELIVERIES = [
            {
                id: 'DEL-001',
                product: 'Notebook Dell XPS 15',
                address: 'Av. Paulista, 1000 - Bela Vista',
                distance: '3.2 km',
                payout: 'R$ 15,00',
                driverLocation: [-23.5505, -46.6333], // Praça da Sé
                deliveryLocation: [-23.5655, -46.6533], // Av Paulista
            },
            {
                id: 'DEL-002',
                product: 'Documentos Confidenciais',
                address: 'Rua Augusta, 500 - Consolação',
                distance: '1.8 km',
                payout: 'R$ 9,50',
                driverLocation: [-23.5505, -46.6333],
                deliveryLocation: [-23.5485, -46.6483],
            },
            {
                id: 'DEL-003',
                product: 'Peças Automotivas',
                address: 'Av. Brigadeiro Faria Lima, 2000',
                distance: '6.5 km',
                payout: 'R$ 22,00',
                driverLocation: [-23.5505, -46.6333],
                deliveryLocation: [-23.5805, -46.6833],
            }
        ];

        // Navegação entre telas
        function switchView(viewId) {
            document.querySelectorAll('body > div').forEach(el => {
                if (el.id.startsWith('view-')) {
                    el.classList.add('hidden-view');
                }
            });
            document.getElementById(viewId).classList.remove('hidden-view');
            
            if (viewId === 'view-dashboard') {
                renderDeliveries();
            }
            
            feather.replace();
        }

        // Registro
        document.getElementById('form-register').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            
            registeredUser = { name, email };
            
            document.getElementById('form-register').reset();
            document.getElementById('login-email').value = email;
            switchView('view-login');
            alert('Cadastro criado com sucesso! Faça login.');
        });

        // Login
        document.getElementById('form-login').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            
            if ((registeredUser && email === registeredUser.email) || email === 'teste@teste.com') {
                const userName = registeredUser ? registeredUser.name : 'Motoboy Teste';
                document.getElementById('dashboard-user-name').innerText = `Olá, ${userName}`;
                switchView('view-dashboard');
            } else {
                alert('Usuário não encontrado. Crie uma conta ou use teste@teste.com');
            }
        });

        // Logout
        function logout() {
            document.getElementById('form-login').reset();
            switchView('view-login');
        }

        // Renderizar lista de entregas
        function renderDeliveries() {
            const listContainer = document.getElementById('deliveries-list');
            listContainer.innerHTML = '';

            MOCK_DELIVERIES.forEach(delivery => {
                const card = document.createElement('div');
                card.className = 'bg-white border border-gray-200 rounded-xl p-5 shadow-sm hover:shadow-md transition-shadow';
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="inline-block px-2 py-1 bg-gray-100 text-gray-800 text-xs font-bold rounded mb-2">${delivery.id}</span>
                            <h3 class="font-bold text-black text-lg">${delivery.product}</h3>
                        </div>
                        <div class="text-right">
                            <span class="block text-xl font-black text-black">${delivery.payout}</span>
                            <span class="text-sm text-gray-500 flex items-center justify-end gap-1 mt-1">
                                <i data-feather="navigation" class="w-3 h-3"></i> ${delivery.distance}
                            </span>
                        </div>
                    </div>
                    
                    <div class="flex items-start gap-3 mb-6 bg-gray-50 p-3 rounded-lg border border-gray-100">
                        <i data-feather="map-pin" class="w-5 h-5 text-gray-400 mt-0.5 shrink-0"></i>
                        <div>
                            <p class="text-xs text-gray-500 font-medium uppercase tracking-wider mb-0.5">Destino</p>
                            <p class="text-sm text-black font-medium">${delivery.address}</p>
                        </div>
                    </div>

                    <button onclick="acceptDelivery('${delivery.id}')" class="w-full bg-black text-white font-medium py-3 rounded-lg hover:bg-gray-800 transition-colors flex items-center justify-center gap-2">
                        <i data-feather="check-circle" class="w-5 h-5"></i>
                        Aceitar Entrega
                    </button>
                `;
                listContainer.appendChild(card);
            });
            feather.replace();
        }

        // Aceitar Entrega
        function acceptDelivery(id) {
            activeDelivery = MOCK_DELIVERIES.find(d => d.id === id);
            
            document.getElementById('delivery-id-header').innerText = activeDelivery.id;
            document.getElementById('delivery-product').innerText = activeDelivery.product;
            document.getElementById('delivery-address').innerText = activeDelivery.address;
            document.getElementById('delivery-payout').innerText = activeDelivery.payout;
            
            switchView('view-delivery');
            
            setTimeout(() => {
                initMap(activeDelivery);
            }, 100);
        }

        // Finalizar Entrega
        function finishDelivery() {
            activeDelivery = null;
            switchView('view-dashboard');
            alert('Entrega finalizada com sucesso!');
        }

        // Alternar entre Mapa Normal e Satélite
        function toggleMapMode() {
            if (!mapInstance) return;

            if (currentLayerMode === 'normal') {
                mapInstance.removeLayer(normalLayer);
                satelliteLayer.addTo(mapInstance);
                if (routePolyline) routePolyline.setStyle({ color: 'white' });
                currentLayerMode = 'satellite';
                document.getElementById('map-toggle-text').innerText = 'Mapa';
            } else {
                mapInstance.removeLayer(satelliteLayer);
                normalLayer.addTo(mapInstance);
                if (routePolyline) routePolyline.setStyle({ color: 'black' });
                currentLayerMode = 'normal';
                document.getElementById('map-toggle-text').innerText = 'Satélite';
            }
        }

        // Inicializar Mapa Leaflet (Linha Reta)
        function initMap(delivery) {
            if (mapInstance) {
                mapInstance.remove();
            }

            mapInstance = L.map('map-container', { zoomControl: false });
            currentLayerMode = 'normal';
            document.getElementById('map-toggle-text').innerText = 'Satélite';

            // Adicionar tile layer inicial (Normal)
            normalLayer.addTo(mapInstance);

            // Ícone do Motorista (Preto)
            const driverIcon = L.divIcon({
                className: 'bg-transparent border-0',
                html: `<div class="flex items-center justify-center w-10 h-10 bg-black rounded-full border-2 border-white shadow-md"><i data-feather="navigation" style="color: white; width: 20px; height: 20px;"></i></div>`,
                iconSize: [40, 40],
                iconAnchor: [20, 20],
                popupAnchor: [0, -20],
            });

            // Ícone do Destino (Cinza)
            const destIcon = L.divIcon({
                className: 'bg-transparent border-0',
                html: `<div class="flex items-center justify-center w-10 h-10 bg-gray-500 rounded-full border-2 border-white shadow-md"><i data-feather="package" style="color: white; width: 20px; height: 20px;"></i></div>`,
                iconSize: [40, 40],
                iconAnchor: [20, 20],
                popupAnchor: [0, -20],
            });

            // Adicionar Marcadores
            L.marker(delivery.driverLocation, {icon: driverIcon})
                .addTo(mapInstance)
                .bindPopup('<div class="text-black font-medium text-center">Sua localização</div>');
                
            L.marker(delivery.deliveryLocation, {icon: destIcon})
                .addTo(mapInstance)
                .bindPopup(`<div class="text-black font-medium text-center">Destino:<br/><span class="text-gray-600">${delivery.product}</span></div>`);

            // Traçar linha reta
            routePolyline = L.polyline([delivery.driverLocation, delivery.deliveryLocation], {
                color: 'black', 
                weight: 3, 
                dashArray: '8, 8'
            }).addTo(mapInstance);

            // Ajustar zoom
            const bounds = L.latLngBounds([delivery.driverLocation, delivery.deliveryLocation]);
            mapInstance.fitBounds(bounds, { padding: [50, 50] });

            feather.replace();
        }
    </script>
</body>
</html>
